# Nivo — Mac mini deploy: Postgres + Redis + API (minimal; auth via Auth0 cloud)
# See docs/DEPLOY_MAC_MINI.md. Auth: docs/AUTH_AUTH0_SETUP.md.
#
# Redis is required for RQ (enrichment, Deep Research async jobs). The API service sets
# REDIS_URL=redis://redis:6379/0 so the container talks to the Redis service, not localhost.

services:
  redis:
    image: redis:7-alpine
    container_name: nivo-redis
    networks:
      - nivo_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: nivo-pg
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nivo}
      POSTGRES_USER: ${POSTGRES_USER:-nivo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - nivo_pg_data:/var/lib/postgresql/data
    networks:
      - nivo_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nivo} -d ${POSTGRES_DB:-nivo}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Expose for bootstrap/migrations and remote dev (0.0.0.0 so laptop can connect via LAN or Tailscale)
    ports:
      - "0.0.0.0:5433:5432"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nivo-api
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      # Must use Docker service name — localhost inside the API container is not host Redis
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:8000:8000"  # Explicit host binding for cloudflared tunnel
    networks:
      - nivo_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  nivo_pg_data:

networks:
  nivo_net:
    driver: bridge
