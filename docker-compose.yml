# Nivo — Mac mini deploy: Postgres + Redis + API (minimal; auth via Auth0 cloud)
# See docs/DEPLOY_MAC_MINI.md. Auth: docs/AUTH_AUTH0_SETUP.md.
#
# Redis is required for RQ (enrichment, Deep Research async jobs). The API service sets
# REDIS_URL=redis://redis:6379/0 so the container talks to the Redis service, not localhost.
# The `worker` service must run too — otherwise jobs enqueue but never execute.
#
# pull_policy: missing — use locally cached redis/postgres images; do not re-pull on every deploy.
# Rebuild API only when backend changes: docker compose build api && docker compose up -d api

services:
  redis:
    image: redis:7-alpine
    pull_policy: missing
    container_name: nivo-redis
    networks:
      - nivo_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    # Includes pgvector — required by migrations 005 (if applied), 042_exemplar_report_chunks, etc.
    image: pgvector/pgvector:pg16
    pull_policy: missing
    container_name: nivo-pg
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nivo}
      POSTGRES_USER: ${POSTGRES_USER:-nivo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - nivo_pg_data:/var/lib/postgresql/data
    networks:
      - nivo_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nivo} -d ${POSTGRES_DB:-nivo}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Expose for bootstrap/migrations and remote dev (0.0.0.0 so laptop can connect via LAN or Tailscale)
    ports:
      - "0.0.0.0:5433:5432"

  api:
    image: nivo-api:local
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nivo-api
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      # Must use Docker service name — localhost inside the API container is not host Redis
      REDIS_URL: redis://redis:6379/0
    ports:
      # 0.0.0.0: LAN dev (laptop Vite proxy → mini:8000). Cloudflared on the mini still uses http://127.0.0.1:8000.
      - "0.0.0.0:8000:8000"
    networks:
      - nivo_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # RQ worker: without this, jobs stay in Redis forever (enrichment, Deep Research, etc.).
  # Same image/env as api so imports and DB/Redis match.
  worker:
    image: nivo-api:local
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nivo-worker
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    command:
      - /bin/sh
      - -c
      - |
        exec rq worker enrichment ai_analysis deep_research \
          --url "$${REDIS_URL}" \
          --path /app
    networks:
      - nivo_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  nivo_pg_data:

networks:
  nivo_net:
    driver: bridge
