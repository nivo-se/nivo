# Screening v1 — Layer 1: hard operating/service name rules in code + YAML extras below.
# Low Noise Factory + Snigel not in universe yet.

constraints:
  min_revenue_sek: 50000000
  # Optional caps (null = off): drop obvious mega-caps before Layer 2
  max_revenue_sek: null
  max_employees: null
  # Multiplicative boost to total_score when company name matches product/manufacturing signals
  product_similarity_boost: 0.04
  # If true, exclude rows with no product signal unless orgnr is in liked_orgnrs / archetypes
  require_product_signal: false
  # Suffix patterns like " Sweden AB", " Systems AB" (see screening_rank_v1.py)
  apply_global_shell_suffixes: true
  nace_deny_prefixes: []
  min_calendar_year: null
  max_latest_year_age: null

# Exact orgnr / legal-name denies (merged with built-in major-orgnr list in code)
hard_exclusion_orgnrs: []

hard_exclusion_company_names: []

# Extra tokens for product-signal boost / optional require gate (merged with defaults in code)
product_signal_keywords: []

name_exclusion_keywords:
  # Extra name substrings not covered by built-in Layer 1 hard lists (substring; "mark" = whole-token)
  - mark
  - anläggning
  - anlaggning
  - transport
  - grossist
  - grossisten
  # Manual blacklist (subsidiaries / obvious non-targets)
  - intertek
  - citrix
  - xilinx
  - grundfos
  - plåt
  - smide
  - bilverkstad
  - osteria
  - hotel

name_penalty_keywords:
  group_like:
    penalty: 0.5
    keywords:
      - group
      - sverige ab
      - sweden ab
      - scandinavia
      - international
      - systems ab
      - notified body
  service_like:
    penalty: 0.25
    keywords:
      - service
      - tjänst
      - teknik
      - management

scoring:
  alpha: 2.5
  min_non_null_per_company: 5
  min_population_coverage: 0.8
  max_combined_penalty: 0.85

winsor:
  p_low: 0.02
  p_high: 0.98

liked_orgnrs:
  - "5562146018" # Fladen Fishing Aktiebolag
  - "5564968039" # Formenta AB
  - "5564169786" # KRYDDHUSET I LJUNG Aktiebolag
  - "5564282738" # Mille Notti AB
  - "5591098214" # Nordiska Kök AB
  - "5565636353" # AB Poly-Produkter (PolyRopes)
  - "5566816632" # Quadpak AB
  - "5564551900" # Texstar AB

archetypes: []

negative_orgnrs: []

calibration:
  assertions:
    max_median_rank_liked: 800
    min_median_rank_negative: 500
    all_liked_in_top: 2000
